<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ingreso - DNI Scanner V2</title>
    
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Librería para escanear Código de Barras (PDF417 / QR) -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Librería para Exportar a Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Configuración para convertirlo en PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e40af">
    
    <style>
        #reader video {
            object-fit: cover !important;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Encabezado / Navbar -->
    <header class="bg-blue-800 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                📋 Control de Accesos <span class="text-xs bg-blue-600 px-2 py-0.5 rounded">V2</span>
            </h1>
            <span id="pwa-status" class="text-xs bg-blue-700 px-2 py-1 rounded-full text-blue-200">Local Storage Activo</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full p-4 flex-grow space-y-6">

        <!-- SECCIÓN 1: Escáner y Estado -->
        <div class="bg-white rounded-2xl shadow p-4 md:p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-3 flex items-center gap-2">
                📷 Escanear Dorso del DNI (PDF417)
            </h2>
            
            <!-- Contenedor de la Cámara -->
            <div class="relative overflow-hidden bg-gray-900 rounded-xl max-w-sm mx-auto aspect-square flex items-center justify-center text-gray-400">
                <div id="reader" class="w-full h-full"></div>
            </div>
            
            <div class="flex justify-center gap-3 mt-4">
                <button onclick="startScanner()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-xl transition shadow">
                    Encender Cámara
                </button>
                <button onclick="stopScanner()" class="bg-gray-500 hover:bg-gray-600 text-white font-medium px-4 py-2 rounded-xl transition">
                    Apagar
                </button>
            </div>
        </div>

        <!-- SECCIÓN 2: Formulario de Registro / Último Escaneado -->
        <div id="section-registro" class="bg-white rounded-2xl shadow p-4 md:p-6 hidden transition-all duration-300 border-l-8 border-blue-600">
            <div class="flex justify-between items-start mb-4">
                <h2 class="text-xl font-bold text-gray-800">Datos Detectados</h2>
                <span id="badge-tipo-movimiento" class="px-3 py-1 text-sm font-bold rounded-full"></span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Documento (DNI)</p>
                    <p id="res-dni" class="text-lg font-bold text-gray-900">-</p>
                </div>
                <div>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Nombre Completo</p>
                    <p id="res-nombre" class="text-lg font-bold text-gray-900">-</p>
                </div>
                <div>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Sexo / Género</p>
                    <p id="res-sexo" class="text-base text-gray-700">-</p>
                </div>
                <div>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Fecha de Nacimiento</p>
                    <p id="res-nacimiento" class="text-base text-gray-700">-</p>
                </div>
            </div>

            <!-- Input de Observaciones (Solo si es Ingreso) -->
            <div id="div-observaciones" class="mt-4">
                <label for="txt-observaciones" class="block text-sm font-semibold text-gray-700 mb-1">Observaciones / Comentarios (Opcional):</label>
                <input type="text" id="txt-observaciones" placeholder="Ej: Trae herramientas, Visita a Oficina 3..." class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800">
            </div>

            <div class="mt-5 flex justify-end gap-3">
                <button onclick="cancelarRegistro()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium px-5 py-2.5 rounded-xl transition">
                    Descartar
                </button>
                <button id="btn-confirmar-registro" onclick="procesarMovimiento()" class="text-white font-medium px-6 py-2.5 rounded-xl transition shadow">
                    Confirmar
                </button>
            </div>
        </div>

        <!-- SECCIÓN 3: Reportes y Exportación -->
        <div class="bg-white rounded-2xl shadow p-4 md:p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                📊 Reportes y Exportación Excel
            </h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-end mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Fecha Desde:</label>
                    <input type="date" id="fecha-desde" class="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm text-gray-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Fecha Hasta:</label>
                    <input type="date" id="fecha-hasta" class="w-full border border-gray-300 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm text-gray-700">
                </div>
            </div>

            <div class="flex flex-wrap gap-3">
                <button onclick="exportarExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2.5 rounded-xl transition shadow flex items-center gap-2 text-sm">
                    💚 Exportar a Excel
                </button>
                <button onclick="limpiarTodaLaBase()" class="bg-red-50 hover:bg-red-100 text-red-600 font-medium px-4 py-2.5 rounded-xl transition text-sm ml-auto">
                    ⚠️ Vaciar Registro
                </button>
            </div>
        </div>

        <!-- SECCIÓN 4: Listado en Tiempo Real de Personas Adentro (Con botón de Salida Manual) -->
        <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    🟢 Personas actualmente adentro (<span id="count-adentro">0</span>)
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-100 text-xs text-gray-700 uppercase">
                        <tr>
                            <th class="p-3">DNI</th>
                            <th class="p-3">Nombre</th>
                            <th class="p-3">Ingreso (Hora)</th>
                            <th class="p-3">Observaciones</th>
                            <th class="p-3 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-adentro" class="divide-y divide-gray-200">
                        <!-- Render dinámico por JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- JavaScript de la Aplicación -->
    <script>
        let html5QrcodeScanner = null;
        let objetoPersonaActual = null; 
        
        let registrosLog = JSON.parse(localStorage.getItem('control_accesos_log')) || [];
        let personasAdentro = JSON.parse(localStorage.getItem('control_accesos_adentro')) || {};

        document.getElementById('fecha-desde').value = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-hasta').value = new Date().toISOString().split('T')[0];

        actualizarVistas();

        // Función para emitir sonido usando Web Audio API nativa
        function reproducirBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Frecuencia alta (Nota La5)
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volumen moderado

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15); // Duración corta: 150 milisegundos
            } catch (error) {
                console.log("No se pudo reproducir sonido, esperando interacción del usuario:", error);
            }
        }

        function startScanner() {
            if (html5QrcodeScanner) {
                stopScanner();
            }

            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { 
                fps: 15, 
                qrbox: { width: 280, height: 200 },
                formatsToSupport: [ Html5QrcodeSupportedFormats.PDF_417, Html5QrcodeSupportedFormats.QR_CODE ]
            };

            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                onScanSuccess
            ).catch(err => {
                alert("Error al acceder a la cámara: " + err);
            });
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                }).catch(err => console.log("Error al detener cámara: ", err));
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            stopScanner();
            
            // Emitir sonido inmediatamente al leer con éxito
            reproducirBeep();
            
            const datosParseados = parsearDniArgentino(decodedText);
            
            if (!datosParseados) {
                alert("Código detectado pero no coincide con el formato de DNI Argentino habitual. Intente nuevamente.");
                startScanner();
                return;
            }

            objetoPersonaActual = datosParseados;
            mostrarFormularioRegistro(datosParseados);
        }

        function parsearDniArgentino(rawText) {
            const campos = rawText.split('@');
            
            if (campos.length >= 8) {
                let dni = campos[4].trim();
                let apellido = campos[1].trim();
                let nombre = campos[2].trim();
                let sexo = campos[3].trim();
                let fechanac = campos[6].trim();

                if(isNaN(dni)) {
                     dni = campos[0].trim(); 
                }

                return { dni, apellido, nombre, sexo, fechanac };
            } 
            
            if (campos.length >= 5) {
                return {
                    dni: campos[1].trim(),
                    apellido: campos[2].trim(),
                    nombre: campos[3].trim(),
                    sexo: campos[4].trim(),
                    fechanac: "No disponible"
                };
            }
            
            return null;
        }

        function mostrarFormularioRegistro(persona) {
            document.getElementById('section-registro').classList.remove('hidden');
            document.getElementById('res-dni').innerText = persona.dni;
            document.getElementById('res-nombre').innerText = `${persona.apellido}, ${persona.nombre}`;
            document.getElementById('res-sexo').innerText = persona.sexo === 'M' ? 'Masculino' : (persona.sexo === 'F' ? 'Femenino' : persona.sexo);
            document.getElementById('res-nacimiento').innerText = persona.fechanac;
            
            const estaAdentro = personasAdentro[persona.dni];
            const badge = document.getElementById('badge-tipo-movimiento');
            const divObs = document.getElementById('div-observaciones');
            const btnConfirmar = document.getElementById('btn-confirmar-registro');

            if (estaAdentro) {
                badge.innerText = "🚨 SALIDA DETECTADA (Marcará Salida)";
                badge.className = "px-3 py-1 text-sm font-bold rounded-full bg-orange-100 text-orange-700";
                divObs.classList.add('hidden'); 
                btnConfirmar.innerText = "Registrar Salida Activa";
                btnConfirmar.className = "bg-orange-600 hover:bg-orange-700 text-white font-medium px-6 py-2.5 rounded-xl transition shadow";
            } else {
                badge.innerText = "✅ INGRESO DETECTADO (Marcará Entrada)";
                badge.className = "px-3 py-1 text-sm font-bold rounded-full bg-green-100 text-green-700";
                divObs.classList.remove('hidden');
                document.getElementById('txt-observaciones').value = ""; 
                btnConfirmar.innerText = "Confirmar Ingreso";
                btnConfirmar.className = "bg-green-600 hover:bg-green-700 text-white font-medium px-6 py-2.5 rounded-xl transition shadow";
            }
        }

        function procesarMovimiento() {
            if (!objetoPersonaActual) return;

            const dni = objetoPersonaActual.dni;
            const timestampActual = new Date().toISOString();
            const fechaLegible = new Date().toLocaleDateString();
            const horaLegible = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (personasAdentro[dni]) {
                ejecutarSalidaLogica(dni, horaLegible, timestampActual);
            } else {
                // Procesar Ingreso
                const obs = document.getElementById('txt-observaciones').value.trim();
                personasAdentro[dni] = {
                    nombre: `${objetoPersonaActual.apellido}, ${objetoPersonaActual.nombre}`,
                    hora: horaLegible,
                    fecha: fechaLegible,
                    observaciones: obs || "Sin observaciones",
                    Timestamp_Iso: timestampActual
                };
            }

            guardarStorage();
            cancelarRegistro();
            actualizarVistas();
        }

        // NUEVA FUNCIÓN: Permite dar salida tanto por escáner como de forma manual por botón
        function ejecutarSalidaLogica(dni, horaSalida, timestamp) {
            const datosIngreso = personasAdentro[dni];
            
            const registroFinal = {
                DNI: dni,
                Nombre: datosIngreso.nombre,
                Fecha: datosIngreso.fecha,
                'Hora Ingreso': datosIngreso.hora,
                'Hora Salida': horaSalida,
                Observaciones: datosIngreso.observaciones,
                Timestamp_Iso: timestamp
            };

            registrosLog.push(registroFinal);
            delete personasAdentro[dni];
        }

        // ACCIÓN NUEVA: Disparador del botón de salida manual de la tabla
        function salidaManual(dni) {
            if (confirm(`¿Dar SALIDA MANUAL a la persona con DNI ${dni}?`)) {
                const timestampActual = new Date().toISOString();
                const horaLegible = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                ejecutarSalidaLogica(dni, horaLegible, timestampActual);
                guardarStorage();
                actualizarVistas();
            }
        }

        function guardarStorage() {
            localStorage.setItem('control_accesos_log', JSON.stringify(registrosLog));
            localStorage.setItem('control_accesos_adentro', JSON.stringify(personasAdentro));
        }

        function cancelarRegistro() {
            objetoPersonaActual = null;
            document.getElementById('section-registro').classList.add('hidden');
        }

        function actualizarVistas() {
            const tbody = document.getElementById('tabla-adentro');
            tbody.innerHTML = "";
            
            const llavesAdentro = Object.keys(personasAdentro);
            document.getElementById('count-adentro').innerText = llavesAdentro.length;

            if (llavesAdentro.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-400 italic">No hay personas registradas adentro en este momento.</td></tr>`;
            } else {
                llavesAdentro.forEach(dni => {
                    const p = personasAdentro[dni];
                    const row = `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-3 font-medium text-gray-900">${dni}</td>
                            <td class="p-3 text-gray-700">${p.nombre}</td>
                            <td class="p-3"><span class="bg-green-100 text-green-800 font-semibold px-2 py-0.5 rounded text-xs">${p.hora}</span></td>
                            <td class="p-3 text-gray-500 text-xs max-w-xs truncate">${p.observaciones}</td>
                            <td class="p-3 text-center">
                                <button onclick="salidaManual('${dni}')" class="bg-red-50 hover:bg-red-600 text-red-600 hover:text-white border border-red-200 hover:border-transparent text-xs font-medium px-2.5 py-1 rounded-lg transition">
                                    Dar Salida
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        }

        function exportarExcel() {
            const desde = document.getElementById('fecha-desde').value;
            const hasta = document.getElementById('fecha-hasta').value;

            if (!desde || !hasta) {
                alert("Por favor selecciona ambas fechas para filtrar.");
                return;
            }

            const fechaInicio = new Date(desde + "T00:00:00");
            const fechaFin = new Date(hasta + "T23:59:59");

            const logsFiltrados = registrosLog.filter(log => {
                const logDate = new Date(log.Timestamp_Iso);
                return logDate >= fechaInicio && logDate <= fechaFin;
            });

            const activosAdentroFiltrados = [];
            Object.keys(personasAdentro).forEach(dni => {
                const p = personasAdentro[dni];
                const pDate = new Date(p.Timestamp_Iso);
                if (pDate >= fechaInicio && pDate <= fechaFin) {
                    activosAdentroFiltrados.push({
                        DNI: dni,
                        Nombre: p.nombre,
                        Fecha: p.fecha,
                        'Hora Ingreso': p.hora,
                        'Hora Salida': "AÚN ADENTRO",
                        Observaciones: p.observaciones
                    });
                }
            });

            const reporteTotal = [...activosAdentroFiltrados, ...logsFiltrados];

            if (reporteTotal.length === 0) {
                alert("No se encontraron registros cargados entre las fechas seleccionadas.");
                return;
            }

            const wb = XLSX.utils.book_new();
            
            const filasExcel = reporteTotal.map(item => ({
                "Documento (DNI)": item.DNI,
                "Nombre y Apellido": item.Nombre,
                "Fecha": item.Fecha,
                "Hora Entrada": item['Hora Ingreso'],
                "Hora Salida": item['Hora Salida'],
                "Observaciones": item.Observaciones
            }));

            const ws = XLSX.utils.json_to_sheet(filasExcel);
            XLSX.utils.book_append_sheet(wb, ws, "Reporte de Accesos");
            XLSX.writeFile(wb, `Reporte_Accesos_${desde}_a_${hasta}.xlsx`);
        }

        function limpiarTodaLaBase() {
            if (confirm("🚨 ¿Seguro que querés vaciar por completo el historial? Esta acción borrará ingresos históricos y activos.")) {
                localStorage.removeItem('control_accesos_log');
                localStorage.removeItem('control_accesos_adentro');
                registrosLog = [];
                personasAdentro = {};
                actualizarVistas();
                cancelarRegistro();
                alert("Base de datos limpia.");
            }
        }
    </script>

    <!-- Service Worker Embebido -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swContent = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                `;
                const blob = new Blob([swContent], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log("SW error", err));
            });
        }
    </script>
</body>
</html>
